<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたの運命属性診断 | 霊視鑑定士たけじい</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #1a1a25;
            --text-primary: #e8e6e3;
            --text-secondary: #a0a0a8;
            --accent-gold: #c9a227;
            --accent-purple: #7c5cbf;
            --border-color: #2a2a35;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container { max-width: 480px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 1.5rem 0;
            margin-bottom: 1.5rem;
        }
        
        header h1 {
            font-size: 1.25rem;
            color: var(--accent-gold);
            letter-spacing: 0.05em;
        }
        
        header p { color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.5rem; }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }
        
        .form-group { margin-bottom: 1.25rem; }
        
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        input, select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-purple);
        }
        
        .row { display: flex; gap: 0.5rem; }
        .row > * { flex: 1; }
        
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-gold), #d4a520);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        
        .btn:active { transform: scale(0.98); }
        
        #result { display: none; }
        
        .result-header {
            text-align: center;
            padding: 1rem 0;
        }
        
        .result-name {
            font-size: 1.25rem;
            color: var(--accent-gold);
        }
        
        .attribute-box {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin: 1rem 0;
        }
        
        .attribute-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        
        .attribute-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
        }
        
        .attribute-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin: 1rem 0;
        }
        
        .stat-item {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); }
        .stat-value { font-size: 1.1rem; color: var(--text-primary); margin-top: 0.25rem; }
        
        .traits {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        
        .traits h3 {
            font-size: 0.85rem;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }
        
        .trait-tag {
            display: inline-block;
            background: var(--border-color);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            margin: 0.25rem;
        }
        
        .cta-box {
            background: linear-gradient(135deg, rgba(124,92,191,0.2), rgba(201,162,39,0.2));
            border: 1px solid var(--accent-purple);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .cta-box h3 {
            font-size: 1rem;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }
        
        .cta-box p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .cta-btn {
            display: block;
            background: #06C755;
            color: white;
            padding: 0.875rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
        }
        
        .back-btn {
            display: block;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 1rem;
            cursor: pointer;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>あなたの運命属性診断</h1>
            <p>姓名と生年月日から、あなたの本質を読み解く</p>
        </header>
        
        <!-- 入力フォーム -->
        <div id="form-section">
            <div class="card">
                <div class="form-group">
                    <label>お名前（漢字）</label>
                    <div class="row">
                        <input type="text" id="sei" placeholder="姓">
                        <input type="text" id="mei" placeholder="名">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>お名前（ひらがな）</label>
                    <div class="row">
                        <input type="text" id="sei_reading" placeholder="せい">
                        <input type="text" id="mei_reading" placeholder="めい">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>生年月日</label>
                    <div class="row">
                        <select id="birth_year">
                            <option value="">年</option>
                        </select>
                        <select id="birth_month">
                            <option value="">月</option>
                        </select>
                        <select id="birth_day">
                            <option value="">日</option>
                        </select>
                    </div>
                </div>
                
                <button class="btn" onclick="diagnose()">診断する</button>
            </div>
        </div>
        
        <!-- 結果表示 -->
        <div id="result">
            <div class="card">
                <div class="result-header">
                    <p class="result-name" id="result-name"></p>
                </div>
                
                <div class="attribute-box">
                    <p class="attribute-label">あなたの運命属性</p>
                    <p class="attribute-value" id="main-gogyo"></p>
                    <p class="attribute-sub" id="gogyo-image"></p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <p class="stat-label">総格</p>
                        <p class="stat-value" id="total-strokes"></p>
                    </div>
                    <div class="stat-item">
                        <p class="stat-label">運勢</p>
                        <p class="stat-value" id="luck"></p>
                    </div>
                    <div class="stat-item">
                        <p class="stat-label">日干</p>
                        <p class="stat-value" id="nikkan"></p>
                    </div>
                    <div class="stat-item">
                        <p class="stat-label">日干五行</p>
                        <p class="stat-value" id="nikkan-gogyo"></p>
                    </div>
                </div>
                
                <div class="traits">
                    <h3>あなたの特徴</h3>
                    <div id="traits-container"></div>
                </div>
                
                <div class="traits">
                    <h3>命式（四柱）</h3>
                    <div id="meishiki-display"></div>
                </div>
            </div>
            
            <div class="cta-box">
                <h3>さらに詳しく知りたい方へ</h3>
                <p>恋愛運・金運・今後の運勢を<br>個別に鑑定します</p>
                <a href="https://lin.ee/XXXXXXX" class="cta-btn">LINEで無料鑑定を受ける</a>
            </div>
            
            <p class="back-btn" onclick="showForm()">← もう一度診断する</p>
        </div>
        
        <footer>
            <p>© 2026 霊視鑑定士たけじい</p>
        </footer>
    </div>

<script>
// 初期化
document.addEventListener('DOMContentLoaded', () => {
    const yearSelect = document.getElementById('birth_year');
    const monthSelect = document.getElementById('birth_month');
    const daySelect = document.getElementById('birth_day');
    
    for (let y = 2010; y >= 1940; y--) {
        yearSelect.innerHTML += `<option value="${y}">${y}年</option>`;
    }
    for (let m = 1; m <= 12; m++) {
        monthSelect.innerHTML += `<option value="${m}">${m}月</option>`;
    }
    for (let d = 1; d <= 31; d++) {
        daySelect.innerHTML += `<option value="${d}">${d}日</option>`;
    }
});

// 旧字体画数データ
const STROKE_COUNT = {
    '高': 10, '市': 6, '早': 6, '苗': 11, '田': 5, '中': 4, '山': 3, '川': 3,
    '木': 4, '林': 8, '森': 12, '藤': 21, '佐': 7, '伊': 6, '加': 5, '井': 4,
    '本': 5, '吉': 6, '太': 4, '郎': 14, '子': 3, '美': 9, '花': 10, '愛': 13,
    '真': 10, '大': 3, '小': 3, '上': 3, '下': 3, '男': 7, '女': 3, '夫': 4,
    '春': 9, '夏': 10, '秋': 9, '冬': 5, '金': 8, '銀': 14, '日': 4, '月': 4,
    '火': 4, '水': 4, '土': 3, '天': 4, '地': 6, '人': 2, '心': 4, '生': 5,
    '一': 1, '二': 2, '三': 3, '四': 5, '五': 5, '六': 6, '七': 7, '八': 8,
    '九': 9, '十': 10, '龍': 16, '竜': 10, '虎': 8, '正': 5, '明': 8, '清': 12,
    '和': 8, '平': 5, '安': 6, '幸': 8, '福': 14, '健': 11, '康': 11, '豊': 18,
    '勝': 12, '勇': 9, '智': 12, '知': 8, '信': 9, '義': 13, '仁': 4, '徳': 15,
    '英': 11, '雄': 12, '秀': 7, '優': 17, '良': 7, '善': 12, '彦': 9, '介': 4,
    '助': 7, '香': 9, '奈': 8, '菜': 14, '里': 7, '理': 12, '恵': 12, '紀': 9,
    '希': 7, '樹': 16, '貴': 12, '実': 14, '光': 6, '翔': 12, '陽': 17, '悠': 11
};

// ひらがな→母音
const HIRAGANA_TO_VOWEL = {
    'あ':'a','い':'i','う':'u','え':'e','お':'o',
    'か':'a','き':'i','く':'u','け':'e','こ':'o',
    'さ':'a','し':'i','す':'u','せ':'e','そ':'o',
    'た':'a','ち':'i','つ':'u','て':'e','と':'o',
    'な':'a','に':'i','ぬ':'u','ね':'e','の':'o',
    'は':'a','ひ':'i','ふ':'u','へ':'e','ほ':'o',
    'ま':'a','み':'i','む':'u','め':'e','も':'o',
    'や':'a','ゆ':'u','よ':'o',
    'ら':'a','り':'i','る':'u','れ':'e','ろ':'o',
    'わ':'a','を':'o','ん':'n',
    'が':'a','ぎ':'i','ぐ':'u','げ':'e','ご':'o',
    'ざ':'a','じ':'i','ず':'u','ぜ':'e','ぞ':'o',
    'だ':'a','ぢ':'i','づ':'u','で':'e','ど':'o',
    'ば':'a','び':'i','ぶ':'u','べ':'e','ぼ':'o',
    'ぱ':'a','ぴ':'i','ぷ':'u','ぺ':'e','ぽ':'o',
    'ゃ':'a','ゅ':'u','ょ':'o','っ':'','ー':''
};

// 母音→五行
const VOWEL_TO_GOGYO = { 'a': '土', 'i': '木', 'u': '金', 'e': '木', 'o': '火', 'n': '水' };

// 五行データ
const GOGYO_DATA = {
    '木': { image: '成長する大樹', traits: ['向上心', 'まっすぐ', '成長志向', '正義感'] },
    '火': { image: '燃える炎', traits: ['情熱的', '明るい', '注目を集める', '行動的'] },
    '土': { image: '大地の安定', traits: ['安定', '信頼', '継続力', '包容力'] },
    '金': { image: '輝く宝石', traits: ['決断力', '美意識', '正義感', '完璧主義'] },
    '水': { image: '流れる水', traits: ['知恵', '柔軟', '直感', '適応力'] }
};

// 画数の吉凶
const STROKE_LUCK = {
    1:'吉',3:'吉',5:'大吉',6:'吉',7:'吉',8:'吉',11:'大吉',13:'大吉',15:'大吉',
    16:'大吉',17:'吉',18:'吉',21:'大吉',23:'大吉',24:'大吉',25:'吉',29:'大吉',
    31:'大吉',32:'大吉',33:'大吉',35:'吉',37:'大吉',39:'大吉',41:'大吉',45:'大吉',
    47:'大吉',48:'大吉'
};

// 十干
const JIKKAN = [
    {name:'甲',reading:'きのえ',gogyo:'木'},
    {name:'乙',reading:'きのと',gogyo:'木'},
    {name:'丙',reading:'ひのえ',gogyo:'火'},
    {name:'丁',reading:'ひのと',gogyo:'火'},
    {name:'戊',reading:'つちのえ',gogyo:'土'},
    {name:'己',reading:'つちのと',gogyo:'土'},
    {name:'庚',reading:'かのえ',gogyo:'金'},
    {name:'辛',reading:'かのと',gogyo:'金'},
    {name:'壬',reading:'みずのえ',gogyo:'水'},
    {name:'癸',reading:'みずのと',gogyo:'水'}
];

// 十二支
const JUNISHI = [
    {name:'子',reading:'ね'},{name:'丑',reading:'うし'},{name:'寅',reading:'とら'},
    {name:'卯',reading:'う'},{name:'辰',reading:'たつ'},{name:'巳',reading:'み'},
    {name:'午',reading:'うま'},{name:'未',reading:'ひつじ'},{name:'申',reading:'さる'},
    {name:'酉',reading:'とり'},{name:'戌',reading:'いぬ'},{name:'亥',reading:'い'}
];

// 六十干支
const KANSHI_60 = [
    '甲子','乙丑','丙寅','丁卯','戊辰','己巳','庚午','辛未','壬申','癸酉',
    '甲戌','乙亥','丙子','丁丑','戊寅','己卯','庚辰','辛巳','壬午','癸未',
    '甲申','乙酉','丙戌','丁亥','戊子','己丑','庚寅','辛卯','壬辰','癸巳',
    '甲午','乙未','丙申','丁酉','戊戌','己亥','庚子','辛丑','壬寅','癸卯',
    '甲辰','乙巳','丙午','丁未','戊申','己酉','庚戌','辛亥','壬子','癸丑',
    '甲寅','乙卯','丙辰','丁巳','戊午','己未','庚申','辛酉','壬戌','癸亥'
];

// 画数計算
function getStrokes(char) {
    return STROKE_COUNT[char] || 8;
}

// 姓名鑑定
function calcSeimei(sei, mei, seiReading, meiReading) {
    const seiStrokes = [...sei].reduce((sum, c) => sum + getStrokes(c), 0);
    const meiStrokes = [...mei].reduce((sum, c) => sum + getStrokes(c), 0);
    const total = seiStrokes + meiStrokes;
    
    // 音霊（母音→五行）
    const reading = seiReading + meiReading;
    const gogyoCounts = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
    
    for (const char of reading) {
        const vowel = HIRAGANA_TO_VOWEL[char];
        if (vowel && VOWEL_TO_GOGYO[vowel]) {
            gogyoCounts[VOWEL_TO_GOGYO[vowel]]++;
        }
    }
    
    const sorted = Object.entries(gogyoCounts).sort((a, b) => b[1] - a[1]);
    const mainGogyo = sorted[0][0];
    const subGogyo = sorted[1][1] > 0 ? sorted[1][0] : null;
    
    const luck = STROKE_LUCK[total] || (total % 10 === 0 || total % 10 === 4 || total % 10 === 9 ? '凶' : '吉');
    
    return { total, seiStrokes, meiStrokes, mainGogyo, subGogyo, luck };
}

// 四柱推命
function calcShichusuimei(year, month, day) {
    // 年柱（1984年が甲子）
    const yearIndex = ((year - 1984) % 60 + 60) % 60;
    const yearKanshi = KANSHI_60[yearIndex];
    
    // 日柱（1900年1月31日が甲子）
    const baseDate = new Date(1900, 0, 31);
    const targetDate = new Date(year, month - 1, day);
    const daysDiff = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
    const dayIndex = ((daysDiff % 60) + 60) % 60;
    const dayKanshi = KANSHI_60[dayIndex];
    
    // 月柱（簡易計算）
    const yearKan = yearKanshi[0];
    const monthKanBase = {'甲':2,'己':2,'乙':4,'庚':4,'丙':6,'辛':6,'丁':8,'壬':8,'戊':0,'癸':0};
    const monthKanIndex = (monthKanBase[yearKan] + month - 1) % 10;
    const monthShiIndex = (month + 1) % 12;
    const monthKanshi = JIKKAN[monthKanIndex].name + JUNISHI[monthShiIndex].name;
    
    // 日干
    const nikkan = dayKanshi[0];
    const nikkanData = JIKKAN.find(j => j.name === nikkan);
    
    return {
        yearKanshi,
        monthKanshi,
        dayKanshi,
        nikkan,
        nikkanReading: nikkanData.reading,
        nikkanGogyo: nikkanData.gogyo
    };
}

// 診断実行
function diagnose() {
    const sei = document.getElementById('sei').value.trim();
    const mei = document.getElementById('mei').value.trim();
    const seiReading = document.getElementById('sei_reading').value.trim();
    const meiReading = document.getElementById('mei_reading').value.trim();
    const year = parseInt(document.getElementById('birth_year').value);
    const month = parseInt(document.getElementById('birth_month').value);
    const day = parseInt(document.getElementById('birth_day').value);
    
    if (!sei || !mei || !seiReading || !meiReading || !year || !month || !day) {
        alert('すべての項目を入力してください');
        return;
    }
    
    const seimei = calcSeimei(sei, mei, seiReading, meiReading);
    const shichusuimei = calcShichusuimei(year, month, day);
    
    // 結果表示
    document.getElementById('result-name').textContent = `${sei}${mei} さん`;
    document.getElementById('main-gogyo').textContent = seimei.mainGogyo;
    document.getElementById('gogyo-image').textContent = GOGYO_DATA[seimei.mainGogyo].image;
    document.getElementById('total-strokes').textContent = `${seimei.total}画`;
    document.getElementById('luck').textContent = seimei.luck;
    document.getElementById('nikkan').textContent = `${shichusuimei.nikkan}`;
    document.getElementById('nikkan-gogyo').textContent = shichusuimei.nikkanGogyo;
    
    // 特徴タグ
    const traitsContainer = document.getElementById('traits-container');
    traitsContainer.innerHTML = '';
    const traits = [...GOGYO_DATA[seimei.mainGogyo].traits];
    if (seimei.subGogyo) {
        traits.push(...GOGYO_DATA[seimei.subGogyo].traits.slice(0, 2));
    }
    traits.forEach(t => {
        traitsContainer.innerHTML += `<span class="trait-tag">${t}</span>`;
    });
    
    // 命式表示
    const meishikiDisplay = document.getElementById('meishiki-display');
    meishikiDisplay.innerHTML = `
        <div style="display:flex;justify-content:space-around;text-align:center;margin-top:0.5rem;">
            <div><span style="font-size:0.7rem;color:var(--text-secondary);">年柱</span><br>${shichusuimei.yearKanshi}</div>
            <div><span style="font-size:0.7rem;color:var(--text-secondary);">月柱</span><br>${shichusuimei.monthKanshi}</div>
            <div><span style="font-size:0.7rem;color:var(--text-secondary);">日柱</span><br>${shichusuimei.dayKanshi}</div>
        </div>
    `;
    
    // 表示切り替え
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    window.scrollTo(0, 0);
}

// フォーム再表示
function showForm() {
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
